name: InfraCore CI – Unit Tests + Evaluation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          python -m pytest tests/unit/ -v --tb=short

  eval-regression:
    name: Evaluation Regression Check
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Create eval_reports directory
        run: mkdir -p eval_reports

      - name: Run evaluation benchmark
        run: |
          python benchmarks/eval_bench.py --samples 10 --output eval_reports

      - name: Check evaluation metrics
        run: |
          # Parse the report and verify all metrics >= 0.70
          if grep -q "❌ FAIL" eval_reports/*.md; then
            echo "❌ Evaluation failed: one or more metrics below 0.70 threshold"
            cat eval_reports/*.md
            exit 1
          else
            echo "✅ All metrics above 0.70 threshold"
            cat eval_reports/*.md
          fi

      - name: Upload evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: eval_reports/
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportFiles = require('glob').sync('eval_reports/*.md');
            if (reportFiles.length > 0) {
              const report = fs.readFileSync(reportFiles[0], 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 📊 Evaluation Report\n\n${report}`
              });
            }
