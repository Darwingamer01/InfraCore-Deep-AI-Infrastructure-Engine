name: CI — OCR smoke test

on:
  workflow_dispatch: {}

jobs:
  ocr-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system deps (Tesseract)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y tesseract-ocr libtesseract-dev libleptonica-dev pkg-config

      - name: Show tesseract version
        run: tesseract --version

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pillow pytesseract

      - name: Run OCR smoke test
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          PYTHONPATH=src python -m pytest tests/unit/test_multimodal.py::test_ocr_integration_smoke -q -vv -s
